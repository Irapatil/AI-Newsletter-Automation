services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-newsletter-automation:latest
    container_name: ai-newsletter-automation
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    volumes:
      - ./data/history:/app/data/history
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
